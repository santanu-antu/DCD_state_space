data:
  static_csv:   data/static_target.csv
  dyn_csv:      data/dynamic_variables.csv
  mask_csv:     data/missing_variables.csv
  int_csv:      data/medications.csv
  scalers_path: data_preprocessed/scalers.pkl
  static_cols:
    - SEX
    - WEIGHT_IN_KG
    - BMI
    - AGE
    - has_dialysisorders
  static_continuous_cols:
    - WEIGHT_IN_KG
    - BMI
    - AGE
  static_binary_cols:
    - SEX
    - has_dialysisorders
  target_col:   time_extub_to_death_hours
  label_col:    time_range
  time_col:     time_to_extube_hours
  pid_col:      PAT_ID
  label_scheme: "4class"  # "4class" | "6class"

split:
  train_frac: 0.70
  val_frac:   0.15
  seed: 42

model:
  d_h:      64
  d_u:      32
  d_z:      128
  n_read:   10
  n_dyn:    20
  n_int:    5
  n_static: 5
  n_classes: 4
  dynamic_module: irr_gru  # "irr_gru" | "ode_rnn"
  ode_hidden: 64
  ode_layers: 2
  h_mode: continuous       # "continuous" | "intervention_gated"

training:
  batch_size:        16
  epochs:            15
  lr:                1.0e-3
  weight_decay:      1.0e-4
  grad_clip:         1.0
  lr_scheduler:      plateau
  lr_patience:       3
  lr_factor:         0.5
  use_class_weights: false

paths:
  checkpoint_dir: checkpoints/
  log_dir:        logs/
  best_model:     checkpoints/best_model_unweighted.pt
  results:        results/test_metrics_unweighted.json
